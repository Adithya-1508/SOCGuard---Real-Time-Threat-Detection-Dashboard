apiVersion: v1
kind: Secret
metadata:
  name: threat-agent-secrets
type: Opaque
stringData:
  # In a real deployment, use SealedSecrets or Vault
  DATABASE_URL: "postgresql+asyncpg://threatuser:threatpass@postgres-service:5432/threatdb"
  OTX_API_KEY: "your_otx_key_here"
  SECRET_KEY: "change_this_to_a_secure_random_string"
  REDIS_URL: "redis://redis-service:6379/0"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "threatuser"
        - name: POSTGRES_PASSWORD
          value: "threatpass"
        - name: POSTGRES_DB
          value: "threatdb"
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {} # Use PersistentVolumeClaim in production

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
