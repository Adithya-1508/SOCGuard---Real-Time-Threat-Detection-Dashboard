apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2 # Horizontal scaling: 2 replicas
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: threat-agent-backend:latest
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: threat-agent-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: threat-agent-secrets
              key: REDIS_URL
        - name: OTX_API_KEY
          valueFrom:
            secretKeyRef:
              name: threat-agent-secrets
              key: OTX_API_KEY
        ports:
        - containerPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 2 # Horizontal scaling: 2 workers
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: threat-agent-backend:latest
        command: ["python", "-m", "app.tasks"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: threat-agent-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: threat-agent-secrets
              key: REDIS_URL
        - name: OTX_API_KEY
          valueFrom:
            secretKeyRef:
              name: threat-agent-secrets
              key: OTX_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort # Expose globally for testing (LoadBalancer in production)
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: threat-agent-frontend:latest
        ports:
        - containerPort: 80
