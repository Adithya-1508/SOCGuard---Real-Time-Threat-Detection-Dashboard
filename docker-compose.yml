version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: threatdb
      POSTGRES_USER: threatuser
      POSTGRES_PASSWORD: threatpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/srv/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://threatuser:threatpass@db:5432/threatdb"
      DATABASE_SYNC_URL: "postgresql://threatuser:threatpass@db:5432/threatdb"
      REDIS_URL: "redis://redis:6379/0"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      OTX_API_KEY: ${OTX_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-fallback-insecure-key-do-not-use-in-production}
      COLLECTOR_TOKEN: ${COLLECTOR_TOKEN:-super-secret-collector-token}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./soc-dashboard
    ports:
      - "5173:80"
    depends_on:
      - app

volumes:
  pgdata:
